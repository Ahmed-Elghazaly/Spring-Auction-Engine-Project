spring.application.name=bidforge
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
spring.datasource.username=${DB_USER:bidforge}
spring.datasource.password=${DB_PASSWORD:bidforge_pw}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.jackson.default-property-inclusion=non_null
bidforge.jwt.secret=${JWT_SECRET:seeeeccreeeeeeetttt-keeeeeeeyyyyyyyyyy}
bidforge.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
