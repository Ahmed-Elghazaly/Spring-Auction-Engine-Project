services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: bidforge-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: SysPass
      APP_USER: bidforge
      APP_USER_PASSWORD: bidforge_pw
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: [ "CMD", "healthcheck.sh" ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 20s

volumes:
  oracle-data:
